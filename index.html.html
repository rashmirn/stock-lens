<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Tickertape | Indian Stocks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-green-600">InvestTrack <span class="text-gray-400 text-sm font-normal">India</span></h1>
        <div class="flex items-center gap-4">
            <input id="stockSearch" type="text" placeholder="Search (e.g. RELIANCE)" class="border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            <button onclick="updateChart()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700">Analyze</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border h-[500px]">
                <div id="tradingview_widget" class="h-full"></div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-4 bg-green-50 rounded-lg">
                    <p class="text-sm text-gray-500 uppercase font-bold">Recommendation</p>
                    <h3 id="recValue" class="text-2xl font-bold text-green-700">STRONG BUY</h3>
                </div>
                <div class="p-4 bg-blue-50 rounded-lg">
                    <p class="text-sm text-gray-500 uppercase font-bold">Trend</p>
                    <h3 class="text-2xl font-bold text-blue-700">Bullish</h3>
                </div>
                <div class="p-4 bg-yellow-50 rounded-lg">
                    <p class="text-sm text-gray-500 uppercase font-bold">Market Condition</p>
                    <h3 class="text-2xl font-bold text-yellow-700">Healthy</h3>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4">Add to Portfolio</h2>
                <div class="space-y-3">
                    <input id="portSymbol" type="text" placeholder="Symbol (e.g. TCS)" class="w-full border rounded-lg px-4 py-2 text-sm">
                    <input id="portQty" type="number" placeholder="Quantity" class="w-full border rounded-lg px-4 py-2 text-sm">
                    <input id="portPrice" type="number" placeholder="Buy Price (Avg)" class="w-full border rounded-lg px-4 py-2 text-sm">
                    <button onclick="addToPortfolio()" class="w-full bg-gray-900 text-white py-2 rounded-lg font-semibold hover:bg-black">Add Stock</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">Your Portfolio</h2>
                    <span id="totalPL" class="text-sm font-bold text-green-600">+₹0.00</span>
                </div>
                <div id="portfolioList" class="space-y-4 max-h-[400px] overflow-y-auto">
                    <p class="text-gray-400 text-sm italic">No stocks added yet.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Chart
        let currentSymbol = "RELIANCE";

        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": "NSE:" + symbol,
                "interval": "D",
                "timezone": "Asia/Kolkata",
                "theme": "light",
                "style": "1",
                "locale": "in",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_widget"
            });
        }

        function updateChart() {
            const symbol = document.getElementById('stockSearch').value.toUpperCase();
            if (symbol) {
                currentSymbol = symbol;
                loadChart(symbol);
                // Mock Recommendation Logic
                const recs = ["BUY", "STRONG BUY", "HOLD", "NEUTRAL"];
                document.getElementById('recValue').innerText = recs[Math.floor(Math.random() * recs.length)];
            }
        }

        // Portfolio Logic
        let portfolio = JSON.parse(localStorage.getItem('myPortfolio')) || [];

        function addToPortfolio() {
            const sym = document.getElementById('portSymbol').value.toUpperCase();
            const qty = parseFloat(document.getElementById('portQty').value);
            const price = parseFloat(document.getElementById('portPrice').value);

            if (sym && qty && price) {
                portfolio.push({ sym, qty, price });
                localStorage.setItem('myPortfolio', JSON.stringify(portfolio));
                renderPortfolio();
                // Reset inputs
                document.getElementById('portSymbol').value = '';
                document.getElementById('portQty').value = '';
                document.getElementById('portPrice').value = '';
            }
        }

        function renderPortfolio() {
            const container = document.getElementById('portfolioList');
            if (portfolio.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-sm italic">No stocks added yet.</p>';
                return;
            }

            container.innerHTML = portfolio.map((item, index) => `
                <div class="flex justify-between items-center p-3 border rounded-lg hover:bg-gray-50 cursor-pointer" onclick="loadChart('${item.sym}')">
                    <div>
                        <p class="font-bold text-sm">${item.sym}</p>
                        <p class="text-xs text-gray-500">${item.qty} Shares @ ₹${item.price}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-semibold">₹${(item.qty * item.price).toLocaleString('en-IN')}</p>
                        <button onclick="event.stopPropagation(); removeStock(${index})" class="text-[10px] text-red-500 underline">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function removeStock(index) {
            portfolio.splice(index, 1);
            localStorage.setItem('myPortfolio', JSON.stringify(portfolio));
            renderPortfolio();
        }

        // Initial Load
        loadChart(currentSymbol);
        renderPortfolio();
    </script>
</body>
</html>
